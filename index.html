<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milano — Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #FAFAFA;
            color: #000000;
            letter-spacing: -0.02em;
            -webkit-font-smoothing: antialiased;
        }

        /* Pure thin Apple line */
        .hairline {
            background-color: #E5E5EA;
            height: 1px;
            width: 100%;
        }

        /* Flight path dashed line animation */
        @keyframes routeFlow {
            to { stroke-dashoffset: -16; }
        }
        .flight-line {
            stroke-dasharray: 4, 4;
            animation: routeFlow 1.5s linear infinite;
        }

        /* Language toggle */
        .lang-toggle {
            display: inline-flex;
            border: 1px solid #E5E5EA;
            border-radius: 999px;
            overflow: hidden;
            background: #fff;
        }
        .lang-toggle button {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            padding: 4px 12px;
            color: #8E8E93;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .lang-toggle button.active {
            background: #000;
            color: #fff;
        }

        /* Private preview button (hidden unless enabled via #dev) */
        #devTestBtn {
            display: none;
            position: fixed;
            bottom: 14px;
            right: 14px;
            z-index: 50;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: #8E8E93;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid #E5E5EA;
            border-radius: 999px;
            padding: 6px 12px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s ease, color 0.2s ease, border-color 0.2s ease;
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
        }
        #devTestBtn:hover {
            opacity: 1;
            color: #8B0000;
            border-color: #8B0000;
        }

        /* Drifting text fragments — extreme minimalist, lots of breathing space */
        #poetry {
            position: absolute;
            left: 50%;
            bottom: 7%;
            transform: translateX(-50%);
            width: min(78%, 30rem);
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-weight: 200;
            font-size: clamp(11px, 2.5vw, 15px);
            line-height: 1.75;
            letter-spacing: 0.015em;
            color: #A1A1A6;
            opacity: 0;
            transition: opacity 3s ease;
            pointer-events: none;
            will-change: opacity;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 sm:p-6 max-w-3xl mx-auto">

    <header class="text-center pt-8 relative">
        <div class="absolute right-0 top-6">
            <div class="lang-toggle">
                <button id="btn-en" onclick="setLang('en')" class="active">EN</button>
                <button id="btn-it" onclick="setLang('it')">IT</button>
            </div>
        </div>
        <span id="eyebrow" class="text-[11px] font-medium tracking-[0.15em] text-zinc-400 uppercase">COUNTDOWN</span>
        <h1 class="text-3xl sm:text-4xl font-light tracking-tight text-zinc-900 mt-1">Milano</h1>
    </header>

    <section class="py-4 sm:py-6">
        <div class="grid grid-cols-4 gap-2 text-center">
            <div>
                <div id="days" class="text-4xl sm:text-5xl md:text-6xl font-extralight tracking-tighter tabular-nums text-black">00</div>
                <div id="lbl-days" class="text-[10px] font-normal text-zinc-400 mt-1">days</div>
            </div>
            <div>
                <div id="hours" class="text-4xl sm:text-5xl md:text-6xl font-extralight tracking-tighter tabular-nums text-black">00</div>
                <div id="lbl-hours" class="text-[10px] font-normal text-zinc-400 mt-1">hours</div>
            </div>
            <div>
                <div id="minutes" class="text-4xl sm:text-5xl md:text-6xl font-extralight tracking-tighter tabular-nums text-black">00</div>
                <div id="lbl-minutes" class="text-[10px] font-normal text-zinc-400 mt-1">minutes</div>
            </div>
            <div>
                <div id="seconds" class="text-4xl sm:text-5xl md:text-6xl font-extralight tracking-tighter tabular-nums text-zinc-300">00</div>
                <div id="lbl-seconds" class="text-[10px] font-normal text-zinc-400 mt-1">seconds</div>
            </div>
        </div>

        <div class="hairline my-8"></div>

        <div id="subtitle" class="text-center text-[11px] text-zinc-400 font-light">
            Friday, 22:00 (Italy Time)
        </div>
    </section>

    <section class="flex-1 flex flex-col w-full mb-4 sm:mb-6 min-h-[340px]">
        <div class="relative flex-1 min-h-0 w-full bg-white border border-zinc-100 rounded-xl overflow-hidden shadow-[0_1px_3px_rgba(0,0,0,0.02)]">

            <svg id="map" class="absolute inset-0 w-full h-full" viewBox="55 70 460 350" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="balloonGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#e83b3b" />
                        <stop offset="55%" stop-color="#c81f1f" />
                        <stop offset="100%" stop-color="#7d0202" />
                    </linearGradient>
                </defs>
                <path d="M 80,380 L 180,410 L 240,360 L 290,290 L 240,250 L 150,260 Z" fill="none" stroke="#F2F2F7" stroke-width="1" />
                <path d="M 160,210 C 180,240 210,300 280,380 C 260,370 210,310 180,260 Z" fill="none" stroke="#E5E5EA" stroke-width="1" />
                <path d="M 380,150 L 460,140 L 490,185 L 420,210 L 370,180 Z" fill="none" stroke="#F2F2F7" stroke-width="1" />

                <path d="M 460 170 Q 330 140 200 250" fill="none" stroke="#E5E5EA" stroke-width="1" />
                <path d="M 460 170 Q 330 140 200 250" class="flight-line" fill="none" stroke="#8E8E93" stroke-width="1" />

                <circle cx="460" cy="170" r="3" fill="#FFFFFF" stroke="#000000" stroke-width="1" />
                <text x="460" y="155" text-anchor="middle" class="text-[10px] font-normal fill-zinc-400">Budapest</text>
                <text id="seen-hu" x="460" y="143" text-anchor="middle" class="text-[8px] font-light fill-zinc-400">I saw you 0</text>

                <circle cx="200" cy="250" r="3" fill="#000000" />
                <text x="200" y="270" text-anchor="middle" class="text-[10px] font-medium fill-black">Milano</text>
                <text id="seen-it" x="200" y="283" text-anchor="middle" class="text-[8px] font-light fill-zinc-500">I saw you 0</text>

                <!-- Waiting man on Milano: solid-black figure (balloon + string live in global coords below) -->
                <g id="waiting-man" transform="translate(200, 250)">
                    <g fill="#000000">
                        <circle cx="0" cy="-19.5" r="2.8" />
                        <path d="M -3.5,-6 L -4,-15 Q -4,-17 -2,-17 L 2,-17 Q 4,-17 4,-15 L 3.5,-6 Z" />
                        <path d="M -3.5,-6 L -3,0 L -1,0 L -0.4,-6 Z" />
                        <path d="M 0.4,-6 L 1,0 L 3,0 L 3.5,-6 Z" />
                        <path d="M -3.8,-14.5 L -5.8,-8 L -4.8,-7.6 L -3,-14 Z" />
                        <path d="M 3,-14.5 L 6,-22 L 7,-21.5 L 4,-14 Z" />
                    </g>
                </g>

                <!-- Balloon + kite-like string (global coords; driven by JS) -->
                <path id="balloon-string" fill="none" stroke="#1a1a1a" stroke-width="0.5" vector-effect="non-scaling-stroke" stroke-linecap="round" stroke-linejoin="round" />
                <g id="balloon" transform="translate(212, 150)">
                    <rect x="-6" y="-6" width="12" height="12" rx="1.3" fill="url(#balloonGrad)" />
                </g>

                <g id="airplane" transform="translate(460, 170)">
                    <g transform="scale(0.8) translate(-10, -10)">
                        <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z" fill="#000000"/>
                    </g>
                </g>
            </svg>

            <div id="poetry"></div>

        </div>
    </section>

    <button id="devTestBtn" onclick="broadcastBalloon()" title="Release the balloon for everyone on the site">🎈 Test</button>

    <script>
        /* ── Translations (English / Italian) ── */
        const T = {
            en: {
                eyebrow: 'COUNTDOWN',
                days: 'days', hours: 'hours', minutes: 'minutes', seconds: 'seconds',
                subtitle: 'Friday, 22:00 (Italy Time)',
                arrived: 'Landed in Milano 🛬'
            },
            it: {
                eyebrow: 'CONTO ALLA ROVESCIA',
                days: 'giorni', hours: 'ore', minutes: 'minuti', seconds: 'secondi',
                subtitle: 'Venerdì, 22:00 (ora italiana)',
                arrived: 'Atterrato a Milano 🛬'
            }
        };

        let lang = localStorage.getItem('milano-lang') || 'en';
        let arrived = false;

        function setLang(l) {
            lang = l;
            localStorage.setItem('milano-lang', l);
            document.documentElement.lang = l;
            document.getElementById('btn-en').classList.toggle('active', l === 'en');
            document.getElementById('btn-it').classList.toggle('active', l === 'it');
            applyLabels();
        }

        function applyLabels() {
            const t = T[lang];
            document.getElementById('eyebrow').textContent = t.eyebrow;
            document.getElementById('lbl-days').textContent = t.days;
            document.getElementById('lbl-hours').textContent = t.hours;
            document.getElementById('lbl-minutes').textContent = t.minutes;
            document.getElementById('lbl-seconds').textContent = t.seconds;
            document.getElementById('subtitle').textContent = arrived ? t.arrived : t.subtitle;
        }

        /* ── Timezone helpers: build a UTC instant from an Italy (Europe/Rome) wall-clock time, DST-aware ── */
        function romeParts(date) {
            const dtf = new Intl.DateTimeFormat('en-GB', {
                timeZone: 'Europe/Rome', hour12: false,
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            const p = {};
            for (const { type, value } of dtf.formatToParts(date)) p[type] = value;
            // '24' can appear at midnight in some engines — normalize
            if (p.hour === '24') p.hour = '00';
            return {
                year: +p.year, month: +p.month, day: +p.day,
                hour: +p.hour, minute: +p.minute, second: +p.second
            };
        }

        // How many ms Rome is ahead of UTC at a given UTC instant.
        function romeOffset(utcMillis) {
            const p = romeParts(new Date(utcMillis));
            const asIfUTC = Date.UTC(p.year, p.month - 1, p.day, p.hour, p.minute, p.second);
            return asIfUTC - utcMillis;
        }

        // Convert a Rome wall-clock time (y, m[1-12], d, h, mi, s) to a UTC timestamp.
        function romeWallToUTC(y, m, d, h, mi, s) {
            const naive = Date.UTC(y, m - 1, d, h, mi, s);
            let utc = naive - romeOffset(naive);      // first approximation
            utc = naive - romeOffset(utc);            // refine across DST edges
            return utc;
        }

        // Next Friday 22:00 Italy time, relative to `now`.
        function getTarget(now) {
            const r = romeParts(now);
            const weekday = new Date(Date.UTC(r.year, r.month - 1, r.day)).getUTCDay(); // 0=Sun … 5=Fri
            let add = (5 - weekday + 7) % 7;
            const pastCutoff = r.hour > 22 || (r.hour === 22 && (r.minute > 0 || r.second > 0));
            if (add === 0 && pastCutoff) add = 7;
            let target = romeWallToUTC(r.year, r.month - 1 + 1, r.day + add, 22, 0, 0);
            if (target <= now.getTime()) target = romeWallToUTC(r.year, r.month, r.day + add + 7, 22, 0, 0);
            return target;
        }

        let targetTime = getTarget(new Date());
        let startTime = targetTime - 7 * 24 * 60 * 60 * 1000; // journey spans the final week

        // SVG bezier for airplane position
        const p0 = { x: 460, y: 170 }, p1 = { x: 330, y: 140 }, p2 = { x: 200, y: 250 };
        function getBezierPoint(t) {
            const x = (1 - t) * (1 - t) * p0.x + 2 * (1 - t) * t * p1.x + t * t * p2.x;
            const y = (1 - t) * (1 - t) * p0.y + 2 * (1 - t) * t * p1.y + t * t * p2.y;
            const dx = 2 * (1 - t) * (p1.x - p0.x) + 2 * t * (p2.x - p1.x);
            const dy = 2 * (1 - t) * (p1.y - p0.y) + 2 * t * (p2.y - p1.y);
            // Icon points up by default; +90 aligns the nose with the travel direction (toward Milano)
            let angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
            return { x, y, angle };
        }

        function updateCountdown() {
            const now = Date.now();

            // Recompute the target once we pass it (rolls over to the next Friday automatically).
            if (now > targetTime) {
                const next = getTarget(new Date());
                if (next > now) {
                    targetTime = next;
                    startTime = targetTime - 7 * 24 * 60 * 60 * 1000;
                    arrived = false;
                }
            }

            let diff = targetTime - now;
            let progress = (now - startTime) / (targetTime - startTime);
            progress = Math.min(1, Math.max(0, progress));

            if (diff <= 0) { diff = 0; progress = 1; arrived = true; }
            else { arrived = false; }

            const days = Math.floor(diff / 86400000);
            const hours = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

            document.getElementById('subtitle').textContent = arrived ? T[lang].arrived : T[lang].subtitle;

            const pos = getBezierPoint(progress);
            document.getElementById('airplane')
                .setAttribute('transform', `translate(${pos.x}, ${pos.y}) rotate(${pos.angle})`);
        }

        setLang(lang);
        updateCountdown();
        setInterval(updateCountdown, 1000);

        /* ── Balloon: rests above the man on a long kite-like string; every ~3–5 hours it
              drifts naturally across the sky toward wherever the plane is, then returns ── */
        const HAND = { x: 206.5, y: 228 };        // man's hand (global SVG coords)
        const BALLOON_REST = { x: 212, y: 150 };  // resting balloon centre
        const FLIGHT_DURATION = 30000;            // ~30s of visible, natural drift
        const STRING_LEN = 74;                    // trailing kite-string length
        let balloonFlying = false;

        const balloonEl = document.getElementById('balloon');
        const stringEl = document.getElementById('balloon-string');

        function setBalloon(x, y, tilt) {
            balloonEl.setAttribute('transform', `translate(${x}, ${y}) rotate(${tilt || 0})`);
        }

        // At rest: one gentle kite-like curve from the man's hand up to the balloon.
        function setRestString() {
            const bx = BALLOON_REST.x, by = BALLOON_REST.y + 6;               // balloon bottom
            const cx = (HAND.x + bx) / 2 - 7, cy = (HAND.y + by) / 2 + 5;      // soft single bow
            stringEl.setAttribute('d', `M ${HAND.x},${HAND.y} Q ${cx},${cy} ${bx},${by}`);
        }

        // In flight: a long, wispy hair-like string trailing behind the balloon and
        // fluttering in the air — sampled points offset by a travelling sine wave.
        function setTrailingString(x, y, vx, vy, now) {
            const len = Math.hypot(vx, vy) || 1;
            const nx = vx / len, ny = vy / len;   // forward (velocity) unit
            const px = -ny, py = nx;              // perpendicular unit
            const N = 7;
            const pts = [[x, y]];
            for (let i = 1; i <= N; i++) {
                const f = i / N;
                let bx = x - nx * STRING_LEN * f;
                let by = y - ny * STRING_LEN * f + 11 * f * f;   // soft gravity droop toward the tail
                const amp = 3.4 * f;                             // flutter grows toward the free end
                const wave = Math.sin(f * 5.5 - now / 340);
                bx += px * amp * wave;
                by += py * amp * wave;
                pts.push([bx, by]);
            }
            stringEl.setAttribute('d', smoothPath(pts));
        }

        // Smooth curve through points (quadratic segments via midpoints) — no sharp corners.
        function smoothPath(pts) {
            let d = `M ${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
            for (let i = 1; i < pts.length - 1; i++) {
                const mx = (pts[i][0] + pts[i + 1][0]) / 2;
                const my = (pts[i][1] + pts[i + 1][1]) / 2;
                d += ` Q ${pts[i][0].toFixed(1)},${pts[i][1].toFixed(1)} ${mx.toFixed(1)},${my.toFixed(1)}`;
            }
            const last = pts[pts.length - 1];
            d += ` L ${last[0].toFixed(1)},${last[1].toFixed(1)}`;
            return d;
        }

        function quad(a, c, b, t) {
            const mt = 1 - t;
            return {
                x: mt*mt*a.x + 2*mt*t*c.x + t*t*b.x,
                y: mt*mt*a.y + 2*mt*t*c.y + t*t*b.y,
                dx: 2*mt*(c.x - a.x) + 2*t*(b.x - c.x),
                dy: 2*mt*(c.y - a.y) + 2*t*(b.y - c.y)
            };
        }

        function planePos() {
            const m = document.getElementById('airplane').getAttribute('transform')
                .match(/translate\(([-\d.]+), ([-\d.]+)\)/);
            return { x: +m[1], y: +m[2] };
        }

        function animateBalloonRelease() {
            if (balloonFlying) return;
            balloonFlying = true;

            const start = { x: BALLOON_REST.x, y: BALLOON_REST.y };
            const end = planePos();                                   // wherever the plane is now
            const ctrl = { x: (start.x + end.x) / 2, y: Math.min(start.y, end.y) - 35 }; // gentle arc

            balloonEl.style.transition = 'none';
            stringEl.style.transition = 'none';
            const t0 = performance.now();

            function frame(now) {
                let p = (now - t0) / FLIGHT_DURATION;
                if (p > 1) p = 1;
                const e = 1 - (1 - p) * (1 - p);  // ease-out: departs promptly, glides to the plane
                const b = quad(start, ctrl, end, e);
                const sway = Math.sin((now - t0) / 1400) * 4;               // gentle air drift
                const x = b.x + sway, y = b.y;
                const tilt = Math.sin((now - t0) / 1400) * 7;
                setBalloon(x, y, tilt);
                setTrailingString(x, y, b.dx, b.dy, now);
                let op = 1;
                if (p > 0.85) op = Math.max(0, 1 - (p - 0.85) / 0.15);       // fade into the distance
                balloonEl.style.opacity = String(op);
                stringEl.style.opacity = String(op);
                if (p < 1) requestAnimationFrame(frame);
                else returnBalloon();
            }
            requestAnimationFrame(frame);
        }

        function returnBalloon() {
            setBalloon(BALLOON_REST.x, BALLOON_REST.y, 0);
            setRestString();
            balloonEl.style.transition = 'none';
            stringEl.style.transition = 'none';
            balloonEl.style.opacity = '0';
            stringEl.style.opacity = '0';
            requestAnimationFrame(() => {
                balloonEl.style.transition = 'opacity 2.5s ease';
                stringEl.style.transition = 'opacity 2.5s ease';
                balloonEl.style.opacity = '1';
                stringEl.style.opacity = '1';
            });
            balloonFlying = false;
            scheduleNextRelease();
        }

        function scheduleNextRelease() {
            const delay = 3 * 3600000 + Math.random() * (2 * 3600000); // 3–5 hours
            setTimeout(animateBalloonRelease, delay);
        }

        // initial resting state
        setBalloon(BALLOON_REST.x, BALLOON_REST.y, 0);
        setRestString();
        scheduleNextRelease();

        /* ── Shared trigger: pressing Test flies the balloon for EVERYONE on the site.
              Uses the existing Firebase project; a single counter doc is the signal. ── */
        const FB_CONFIG = {
            apiKey: "AIzaSyDOpyzVs2XKi2QRxLnpEUu3rM7A0VO1N80",
            authDomain: "eduai-planner-1b6ac.firebaseapp.com",
            projectId: "eduai-planner-1b6ac",
            storageBucket: "eduai-planner-1b6ac.firebasestorage.app",
            messagingSenderId: "821536586016",
            appId: "1:821536586016:web:fb0452985ba41563daff45"
        };
        let balloonDoc = null, seenN = null;
        try {
            firebase.initializeApp(FB_CONFIG);
            balloonDoc = firebase.firestore().collection('milano').doc('balloon');
            balloonDoc.onSnapshot(snap => {
                const n = (snap.data() || {}).n || 0;
                if (seenN === null) { seenN = n; return; }   // first snapshot: set baseline, don't replay
                if (n !== seenN) { seenN = n; animateBalloonRelease(); }
            }, () => {});
        } catch (e) { balloonDoc = null; }

        // Called by the Test button: animate locally now, and broadcast to everyone else.
        function broadcastBalloon() {
            animateBalloonRelease();
            if (balloonDoc) {
                balloonDoc.set({ n: firebase.firestore.FieldValue.increment(1) }, { merge: true }).catch(() => {});
            }
        }

        /* ── Real visit counter by country: entries from a Hungarian IP show next to Budapest,
              entries from an Italian IP show next to Milano. Persisted & accumulated in Firebase. ── */
        function detectCountry() {
            return fetch('https://api.country.is/')
                .then(r => r.json()).then(d => d && d.country)
                .catch(() => fetch('https://ipapi.co/json/')
                    .then(r => r.json()).then(d => d && d.country_code));
        }

        try {
            const visitsDoc = firebase.firestore().collection('milano').doc('visits');
            const seenHu = document.getElementById('seen-hu');
            const seenIt = document.getElementById('seen-it');

            // Live display of the latest accumulated totals.
            visitsDoc.onSnapshot(snap => {
                const d = snap.data() || {};
                seenHu.textContent = `I saw you ${d.HU || 0}`;
                seenIt.textContent = `I saw you ${d.IT || 0}`;
            }, () => {});

            // Count this visit once per browser session (a refresh doesn't inflate the total).
            if (!sessionStorage.getItem('milano-visit-counted')) {
                detectCountry().then(country => {
                    const field = country === 'HU' ? 'HU' : (country === 'IT' ? 'IT' : null);
                    if (field) {
                        visitsDoc.set({ [field]: firebase.firestore.FieldValue.increment(1) }, { merge: true }).catch(() => {});
                    }
                    sessionStorage.setItem('milano-visit-counted', '1');
                }).catch(() => {});
            }
        } catch (e) {}

        /* ── Private preview button ──
           Enable once by opening the page with #dev (persists on this browser only);
           disable again with #nodev. Public visitors never see it. */
        if (location.hash === '#dev') localStorage.setItem('milano-dev', '1');
        if (location.hash === '#nodev') localStorage.removeItem('milano-dev');
        if (localStorage.getItem('milano-dev') === '1') {
            document.getElementById('devTestBtn').style.display = 'block';
        }

        /* ── Drifting memories: short fragments fade in and out of the space, one at a time,
              with long quiet gaps between them. Add more lines to this list over time. ── */
        const fragments = [
            "Do you remember how I used to write poems to you?",
            "The unfinished story about the Second World War.",
            "Our climb to Lake Devero.",
            "You held me, and told me I was no longer alone.",
            "We stood among the trees, the forest all around.",
            "So many roads together — art, history, religion.",
            "An entire sea lay between us.",
            "But never for long.",
            "We always knew how to find our way back.",
            "Not the sea between us, but every return.",
            "Not the turned backs, but the turning toward each other again.",
            "The poems. The unfinished story. The roads.",
            "The trees. The forest. Lake Devero.",
            "Your embrace.",
            "We always found our way back to one another."
        ];

        const poetryEl = document.getElementById('poetry');
        let fragIdx = Math.floor(Math.random() * fragments.length);

        function showFragment() {
            poetryEl.textContent = fragments[fragIdx % fragments.length];
            fragIdx++;
            // fade in (small timeout so the transition reliably triggers, even in background tabs)
            setTimeout(() => { poetryEl.style.opacity = '1'; }, 40);
            const hold = 9000;          // stay ~9s
            setTimeout(() => { poetryEl.style.opacity = '0'; }, hold);
            // schedule next: after fade-out (3s) + a long quiet gap
            const gap = 14000 + Math.random() * 12000;   // 14–26s of silence
            setTimeout(showFragment, hold + 3000 + gap);
        }

        setTimeout(showFragment, 5000);
    </script>
</body>
</html>
